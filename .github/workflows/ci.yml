name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2.8.2
      - run: cargo clippy --all-targets -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cargo fmt --all -- --check

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run ruff check
      - run: uv run ruff format --check

  ty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run ty check

  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run python tools/parity/generate.py --check

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14", "3.15"]
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2.8.2
      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ matrix.python-version }}
      - run: cargo test --release
      - run: uv run --python ${{ matrix.python-version }} maturin develop --release
      - name: Shim python3 in venv (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item .venv/Scripts/python.exe .venv/Scripts/python3.exe
      - run: uv run --python ${{ matrix.python-version }} tryke test
      - name: Upload visual regression report
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: target/visual-report
          if-no-files-found: ignore
          retention-days: 14

  ci:
    if: always()
    needs: [clippy, fmt, ruff, ty, parity, test]
    runs-on: ubuntu-latest
    steps:
      - name: check all jobs
        run: |
          results=("${{ needs.clippy.result }}" "${{ needs.fmt.result }}" "${{ needs.ruff.result }}" "${{ needs.ty.result }}" "${{ needs.parity.result }}" "${{ needs.test.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "Job failed or was cancelled: $r"
              exit 1
            fi
          done
