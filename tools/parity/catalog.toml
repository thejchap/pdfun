# Spec catalog — hand-curated source of truth for the feature parity matrix.
#
# Schema:
#   [[section]]           top-level grouping (usually a spec chapter or module)
#   spec                  name of the spec (e.g. "CSS 2.1", "CSS Color 3")
#   section               section number within the spec (e.g. "8.3"). "" if N/A.
#   title                 human-readable section title
#
#   [[section.behavior]]  nested: one row in the matrix
#   id                    stable identifier, referenced by test markers (snake-case-or-dashed)
#   title                 human-readable behavior description
#   section               spec sub-section (e.g. "8.3.1"). Falls back to section's own value.
#   weasyprint            "full" | "partial" | "none"
#   implemented           true | false (editorial claim for pdfun)
#
# WeasyPrint baseline: CSS 2.1 is fully supported; CSS3 is per-module.
# See https://doc.courtbouillon.org/weasyprint/stable/first_steps.html#features

