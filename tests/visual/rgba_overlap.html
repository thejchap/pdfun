<!-- spec: CSS Color 3 §4.2.1 + Compositing & Blending L1 §4
     behaviors: color-rgba color-hsla transparency-group

     Cross-viewer parity probe (WS-2 rung 9). When the page-level
     `/Group << /S /Transparency /CS /DeviceRGB /I true >>` entry
     is present, Adobe Reader, Foxit, pdf.js, and macOS Preview
     all composite this fixture identically. Without it, viewers
     diverge: Adobe Reader vs Foxit pick different backdrops for
     the isolated/non-isolated decision (WeasyPrint issue #2723).

     The visible behavior is two overlapping translucent panels
     (red-50% and blue-50%); their intersection should render as
     ~equal-mix purple in every viewer.

     `test_html.py::page_group_entry_present_when_translucent`.

     because the test environment doesn't have Adobe / Foxit
     installed. -->
