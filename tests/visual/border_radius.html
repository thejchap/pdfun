<!-- spec: CSS Backgrounds & Borders 3 §5.1; behaviors: bb3-border-radius -->
<style>
  body { margin: 20px; font-family: sans-serif; }
  .rounded {
    padding: 20px;
    margin-bottom: 15px;
    background-color: #cce5ff;
    border: 2px solid #004085;
  }
  .uniform { border-radius: 12px; }
  .asymmetric {
    border-top-left-radius: 20px;
    border-bottom-right-radius: 20px;
    background-color: #d4edda;
    border-color: #155724;
  }
  .pill { border-radius: 999px; text-align: center; }
</style>
<div class="rounded uniform">Uniform 12px border-radius</div>
<div class="rounded asymmetric">Asymmetric: top-left and bottom-right 20px</div>
<div class="rounded pill">Pill shape</div>
