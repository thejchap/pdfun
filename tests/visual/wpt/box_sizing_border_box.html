<style>@page { size: A4; }</style>
<!-- spec: CSS Backgrounds & Borders 3 §6.2; behaviors: vfmd-box-sizing -->
<style>
  body { margin: 24px; font-family: sans-serif; font-size: 12px; }
  .ruler { width: 240px; height: 8px; background: #999; margin-bottom: 4px; }
  .a, .b { width: 240px; padding: 16px; border: 4px solid #0d6efd; margin-bottom: 8px; background: #cfe2ff; }
  .a { box-sizing: content-box; }       /* total width = 240+32+8 = 280px */
  .b { box-sizing: border-box; }        /* total width = 240px (content shrinks) */
</style>
<div class="ruler"></div>
<div class="a">content-box: this block extends past the ruler above.</div>
<div class="b">border-box: this block ends exactly at the ruler width.</div>
