<!-- spec: CSS Color 3 §3.2; behaviors: color-opacity -->

  body { margin: 20px; font-family: sans-serif; }
  .bg { padding: 15px; margin-bottom: 10px; background-color: #0066cc; color: white; }
</style>

<div class="bg" style="opacity: 0.7">Opacity 0.7</div>
<div class="bg" style="opacity: 0.4">Opacity 0.4</div>
<div class="bg" style="opacity: 0.1">Opacity 0.1 (nearly transparent)</div>
