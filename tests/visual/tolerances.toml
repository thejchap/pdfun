# Per-fixture diff ceilings for the visual regression suite.
#
# The diff metric is structural (shrink + inked-union; see
# `tolerant_pixel_diff` in tests/_visual_diff.py): both images are
# downsampled 8x, then each "inked-in-either" block is compared by mean
# RGB. The value is `differing-blocks / inked-blocks` — i.e. "what
# fraction of the page's content disagrees".
#
# Whitespace doesn't dilute the denominator, so values land in the
# 10-80% range even for small layout shifts. Each ceiling is set to the
# observed diff + ~2 % headroom (rounded up to the nearest 0.02). When
# you fix a regression, ratchet the corresponding ceiling down in the
# same commit so the metric keeps guarding against future drift.
#
# To recompute: open target/visual-report/index.html after
# `uv run tryke test`, or run the snippet in AGENTS.md "what to do next".

[defaults]
pixel_diff_pct = 0.05

[fixtures]
