# Per-fixture diff ceilings for the visual regression suite.
#
# Metric: structural (shrink + inked-union; see `tolerant_pixel_diff` in
# tests/_visual_diff.py). Both images are downsampled 8x then compared
# block-mean RGB. Value = `differing-blocks / inked-blocks` — i.e. "what
# fraction of the page's content disagrees".
#
# Whitespace doesn't dilute the denominator, so values land in the
# 10-80 % range. Each ceiling is the observed diff + ~2 % headroom
# (rounded up to 0.02). When you fix a regression, ratchet the
# corresponding ceiling down in the same commit so the metric keeps
# guarding against future drift.
#
# To recompute: run `uv run tryke test` then the snippet at the bottom
# of AGENTS.md "what to do next".

[defaults]
pixel_diff_pct = 0.05

