<!-- spec: CSS Backgrounds & Borders 3 §4-§6; behaviors: bb3-border-radius, css-border -->
<style>
  body { margin: 24px; font-family: sans-serif; }
  .box {
    width: 220px; padding: 14px; margin-bottom: 14px;
    background: #fff;
  }
  .solid  { border: 3px solid #0d6efd; }
  .dashed { border: 3px dashed #198754; }
  .dotted { border: 3px dotted #dc3545; }
  .round  { border: 3px solid #6f42c1; border-radius: 14px; }
  .pill   { border: 3px solid #fd7e14; border-radius: 999px; padding: 8px 18px; }
  .skewed {
    border: 3px solid #20c997;
    border-top-left-radius: 24px;
    border-bottom-right-radius: 24px;
  }
</style>
<div class="box solid">solid border</div>
<div class="box dashed">dashed border</div>
<div class="box dotted">dotted border</div>
<div class="box round">uniform 14 px radius</div>
<div class="box pill">pill</div>
<div class="box skewed">asymmetric radii</div>
