<!-- spec: CSS 2.1 §8; behaviors: box-padding, box-border-shorthand -->
<style>
  body { margin: 20px; font-family: sans-serif; }
  .box {
    padding: 20px;
    border: 2px solid #333;
    background-color: #ffffcc;
    margin-bottom: 10px;
  }
  .nested {
    padding: 10px;
    border: 1px solid red;
    background-color: #ffcccc;
  }
</style>
<div class="box">
  Box with 20px padding and 2px border
  <div class="nested">Nested box with red border</div>
</div>
<div class="box" style="border-style: dashed; border-color: blue;">
  Dashed blue border
</div>
