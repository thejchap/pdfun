[project]
site_name = "pdfun"
site_url = "https://thejchap.github.io/pdfun/"
site_description = "Pure-Rust HTML/CSS to PDF renderer with Python bindings — a WeasyPrint-compatible subset, zero system dependencies"
site_author = "Justin Chapman"
copyright = "Copyright &copy; 2026 Justin Chapman"
repo_url = "https://github.com/thejchap/pdfun"
repo_name = "thejchap/pdfun"
nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "CSS Support" = "css-support.md" },
  { "Architecture" = "architecture.md" },
  { "Parity Matrix" = "PARITY.md" },
]

[project.plugins.search]
enabled = true

[project.theme]
features = [
  "navigation.instant",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.tracking",
  "navigation.path",
  "toc.follow",
  "search.highlight",
  "content.code.copy",
  "content.code.select",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
